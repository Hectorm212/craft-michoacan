{% extends 'artesanias/encabezado.html' %}
{% load static %}

{% block titulo %}Iniciar sesión - Craft Mich{% endblock %}

{% block contenido %}
<main class="login-main">
    <div class="login-form-container">
        <!-- Título y subtítulo del Login -->
        <h1 class="login-title">Iniciar sesión</h1>
        <p class="login-subtitle">Ingresa tus credenciales para acceder</p>

        <!-- Formulario POST de Django para Autenticación -->
        <form method="POST" action="" class="craft-login-form">
            {% csrf_token %}

            <!-- Campo: Correo electrónico / Usuario -->
            <div class="login-form-group">
                <label for="username" class="login-label">Correo electrónico</label>
                <input type="email" id="username" name="username" class="login-input" placeholder="ejemplo@correo.com" required>
            </div>

            <!-- Campo: Contraseña -->
            <div class="login-form-group">
                <label for="password" class="login-label">Contraseña</label>
                <input type="password" id="password" name="password" class="login-input" placeholder="Tu contraseña" required>
            </div>

            <!-- Enlace opcional por si olvidó la contraseña u opciones extras -->
            <div class="login-options">
                <a href="#" class="forgot-password-link">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón de Envío -->
            <button type="submit" class="btn-submit-login">
                Entrar
            </button>
        </form>
    </div>
</main>

{% endblock %}
